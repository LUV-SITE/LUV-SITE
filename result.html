<html lang="ko">
<head>

  <style>
    :root{--pink:#ff6b9d;--pink-dark:#d63f7a;--pink-pale:#fff0f5;--peach:#ffb347;--blue:#6b9dff;--blue-pale:#f0f4ff;--bg:#fff8fb;--text:#1a1a2e;--muted:#999;--card:#ffffff;--max:430px;--radius:20px;}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Gowun Dodum','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    .wrap{width:100%;max-width:var(--max);padding-bottom:60px;}
    .top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);position:sticky;top:0;z-index:100;border-bottom:1px solid #ffeef5;}
    .back-btn{width:36px;height:36px;border-radius:50%;border:none;background:#f5f5f5;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .top-title{font-size:15px;font-weight:700;}
    .share-icon{width:36px;height:36px;border-radius:50%;border:1px solid #eee;background:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .ad-slot{background:#f5f5f5;border:1px dashed #e0e0e0;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;overflow:hidden;}
    .ad-top{height:60px;margin:8px 16px 0;}
    .ad-mid{height:90px;margin:16px;}
    .ad-native{min-height:80px;margin:0 16px 16px;}
    #save-wrap{background:var(--bg);padding-bottom:4px;border-radius:var(--radius);overflow:hidden;}
    #result-card{margin:16px;border-radius:var(--radius);background:linear-gradient(135deg,#fff0f7 0%,#f0f4ff 100%);border:1.5px solid rgba(255,107,157,0.2);padding:28px 22px 24px;position:relative;overflow:hidden;}
    #result-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(255,179,71,0.2),transparent 70%);border-radius:50%;}
    .mbti-pair{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;}
    .mbti-tag{font-size:18px;font-weight:700;padding:6px 16px;border-radius:100px;}
    .mbti-tag.me{background:var(--pink-pale);color:var(--pink);}
    .mbti-tag.you{background:var(--blue-pale);color:var(--blue);}
    .score-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:18px;}
    .score-circle{width:110px;height:110px;border-radius:50%;background:white;border:4px solid var(--pink);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(255,107,157,0.2);margin-bottom:8px;}
    .score-num{font-size:38px;font-weight:700;background:linear-gradient(135deg,var(--pink),var(--peach));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
    .score-label{font-size:13px;color:var(--muted);}
    .score-grade{font-size:16px;font-weight:700;color:var(--text);}
    .result-title{font-size:20px;font-weight:700;text-align:center;line-height:1.4;margin-bottom:12px;}
    .result-desc{font-size:14px;color:#555;line-height:1.9;text-align:center;background:rgba(255,255,255,0.7);border-radius:14px;padding:14px 16px;}
    .tip-section{margin:0 16px 12px;}
    .tip-card{background:white;border-radius:var(--radius);border:1.5px solid #ffe0ec;padding:18px 20px;}
    .tip-title{font-size:14px;font-weight:700;margin-bottom:12px;}
    .tip-item{display:flex;gap:10px;margin-bottom:10px;font-size:13px;color:#555;line-height:1.7;}
    .tip-num{background:var(--pink);color:white;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
    .analysis-section{margin:0 16px 12px;}
    .analysis-card{background:white;border-radius:var(--radius);border:1.5px solid #ffe0ec;padding:18px 20px;}
    .analysis-title{font-size:14px;font-weight:700;margin-bottom:14px;}
    .bar-item{margin-bottom:12px;}
    .bar-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px;}
    .bar-track{height:8px;background:#f0f0f0;border-radius:100px;overflow:hidden;}
    .bar-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--peach));border-radius:100px;width:0;transition:width 1.2s cubic-bezier(.25,.8,.25,1);}
    .action-section{margin:0 16px;}
    .share-label{font-size:13px;color:var(--muted);text-align:center;font-weight:600;margin-bottom:12px;}
    .share-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
    .share-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 4px;background:white;border:1px solid #f0f0f0;border-radius:14px;cursor:pointer;font-size:11px;color:var(--muted);transition:all 0.15s;font-family:inherit;}
    .share-btn:active{transform:scale(0.94);}
    .share-btn .icon{font-size:26px;}
    .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
    .btn-primary{padding:14px;border:none;background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:white;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
    .btn-primary:active{opacity:0.85;}
    .btn-secondary{padding:14px;border:1.5px solid var(--pink);background:white;color:var(--pink);border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
    .btn-save{width:100%;padding:14px;border:1.5px solid #e0e0e0;background:white;color:var(--text);border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;}
    .btn-save:active{background:#f5f5f5;}
    .recommend-section{margin:16px 16px 0;}
    .rec-title{font-size:16px;font-weight:700;margin-bottom:12px;}
    .rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .rec-card{background:white;border:1px solid #f0f0f0;border-radius:14px;padding:14px 12px;cursor:pointer;text-decoration:none;color:inherit;display:block;}
    .rec-card:active{transform:scale(0.97);border-color:var(--pink);}
    .rec-emoji{font-size:26px;margin-bottom:6px;display:block;}
    .rec-name{font-size:13px;font-weight:700;margin-bottom:3px;line-height:1.3;}
    .rec-sub{font-size:11px;color:var(--muted);}
    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,0.8);color:white;padding:10px 22px;border-radius:100px;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:9999;white-space:nowrap;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    #save-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
    #save-overlay.show{display:flex;}
    #save-overlay span{color:white;font-size:15px;font-weight:600;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading{text-align:center;padding:60px 20px;font-size:32px;animation:hb 1s ease-in-out infinite;}
    @keyframes hb{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}
  </style>

<script>
// =====================================================
// MBTI 궁합 데이터 — 인지기능 기반 조사 정리
// 형식: 'A-B': {score, title, desc, bars:[소통,감정,가치관,지속력], tips:[]}
// A-B 와 B-A 중복 방지: 알파벳 순 정렬 (ENFJ-INFP 등)
// =====================================================
const COMPAT = {

  // NT (분석가) 조합
  'ENFP-INTJ':{score:93,title:'서로를 완성시키는 운명적 만남',desc:'INTJ의 전략적 깊이와 ENFP의 창의적 에너지가 완벽하게 맞물려요. 서로의 약점을 채워주며 함께 성장하는 최고의 조합이에요. 💫',bars:[90,88,92,95],tips:['INTJ는 가끔 즉흥적인 ENFP의 아이디어에 귀 기울여보세요','ENFP는 INTJ의 혼자만의 시간을 존중해주세요','둘 다 깊은 대화를 좋아하니 감정도 솔직하게 나눠보세요']},
  'ENTP-INFJ':{score:92,title:'직관으로 통하는 환상의 케미',desc:'ENTP의 넘치는 아이디어와 INFJ의 깊은 통찰력이 만나 대화가 끝나지 않는 커플이에요. 서로를 통해 세계관이 넓어져요. ✨',bars:[95,85,90,90],tips:['INFJ의 감정을 논쟁으로 이기려 하지 말고 공감해주세요','ENTP는 INFJ에게 혼자만의 충전 시간을 줘야 해요','둘 다 미래 지향적이라 함께 꿈꾸는 시간을 자주 가져보세요']},
  'ENTJ-INTP':{score:88,title:'지적 시너지가 폭발하는 커플',desc:'ENTJ의 실행력과 INTP의 분석력이 합쳐져 뭐든 해낼 것 같은 파워 커플이에요. 서로의 논리를 존중하는 관계예요. 🧠',bars:[90,70,88,85],tips:['ENTJ는 INTP의 느린 결정 속도를 재촉하지 마세요','INTP는 ENTJ의 계획에 더 적극적으로 참여해보세요','감정 표현이 서툰 둘, 먼저 다가가는 쪽이 이겨요']},
  'ENTP-INTJ':{score:88,title:'서로를 날카롭게 벼려주는 사이',desc:'지적 자극이 넘치는 최강 케미예요. 논쟁도 사랑의 언어가 되는 두 분이에요. 🔥',bars:[92,75,85,88],tips:['토론이 싸움으로 번지지 않도록 감정선을 지켜요','INTJ의 계획을 ENTP가 흔들면 스트레스가 될 수 있어요','지적 자극을 데이트에 활용하면 더욱 깊어지는 관계']},

  // NF (외교관) 조합
  'ENFJ-INFP':{score:95,title:'따뜻함으로 물드는 완벽한 조화',desc:'INFP의 섬세한 감성과 ENFJ의 따뜻한 리더십이 만나 세상에서 가장 아름다운 연애를 만들어요. 서로를 이해하고 성장시키는 최고의 파트너예요. 🌸',bars:[88,95,92,95],tips:['ENFJ는 INFP에게 자신의 의견을 강요하지 말아요','INFP는 ENFJ의 노력을 말로 표현해주세요','감정 교류가 풍부한 만큼 갈등도 감정적으로 해결해요']},
  'ENFP-INFJ':{score:95,title:'우주가 맺어준 소울메이트',desc:'서로의 부족한 부분을 완벽하게 채워주는 환상의 커플이에요. ENFP의 에너지와 INFJ의 깊이가 만나 매일이 특별해요. 💫',bars:[98,97,95,92],tips:['INFJ의 직관을 ENFP가 믿고 따라가면 좋아요','ENFP는 INFJ의 희귀한 감정 개방을 소중히 여겨요','둘 다 이상적이라 현실적인 부분도 함께 챙겨요']},
  'ENFJ-INFJ':{score:87,title:'깊은 이해로 연결된 두 영혼',desc:'둘 다 타인을 위하는 마음이 크고 직관이 발달했어요. 말하지 않아도 서로를 이해하는 신비로운 연결이 있어요. 🌌',bars:[85,92,88,85],tips:['서로 너무 배려하다가 정작 자신의 감정을 숨기지 말아요','ENFJ가 주도하는 경향을 INFJ가 편하게 조율해보세요','함께하는 의미 있는 활동이 관계를 더 깊게 해요']},
  'ENFP-ENFJ':{score:88,title:'따뜻함과 자유가 만나는 환상 케미',desc:'ENFJ의 따뜻한 리더십과 ENFP의 자유로운 창의성이 만나 빛나는 관계예요. 주변까지 행복하게 만드는 커플이에요. ✨',bars:[90,88,85,88],tips:['둘 다 외향적이라 혼자만의 시간도 의도적으로 챙겨요','ENFP의 즉흥성을 ENFJ가 부드럽게 받아줘야 해요','갈등을 회피하지 말고 솔직하게 대화로 풀어요']},
  'INFJ-INFP':{score:86,title:'감성과 이상이 만나는 아름다운 사이',desc:'둘 다 깊은 감성과 높은 이상을 가져요. 서로의 내면 세계를 아름답게 채워주는 관계예요. 🌸',bars:[82,92,88,84],tips:['둘 다 갈등을 피하는 성향, 문제는 용기 내어 말해요','INFJ의 직관적 판단을 INFP가 신뢰해주면 좋아요','함께 예술이나 창작 활동을 하면 더 깊어지는 관계']},

function getCompat(a, b) {
  const k1 = a+'-'+b, k2 = b+'-'+a;
  if (COMPAT[k1]) return COMPAT[k1];
  if (COMPAT[k2]) return COMPAT[k2];

  // 인지기능 기반 자동 계산
  let score = 50;
  const sameEI = a[0]===b[0], sameNS = a[1]===b[1];
  const sameTF = a[2]===b[2], sameJP = a[3]===b[3];

  // N끼리 또는 S끼리면 가치관 공유 +8
  score += sameNS ? 8 : 2;
  // E/I 반대면 보완성 +6
  score += sameEI ? 3 : 6;
  // T/F 반대면 보완성 +5
  score += sameTF ? 4 : 5;
  // J/P 같으면 생활패턴 +6
  score += sameJP ? 6 : 3;

  // 시드 기반 미세 차이 (항상 같은 결과)
  const seed = (a.charCodeAt(0)*3 + b.charCodeAt(0)*7 + a.charCodeAt(2) + b.charCodeAt(2)) % 12;
  score += seed;
  score = Math.min(Math.max(score, 45), 85);

  const bars = [
    Math.min(score + Math.floor(seed*0.5), 95),
    Math.min(score - 2 + (sameTF?5:0), 95),
    Math.min(score + (sameNS?8:0), 95),
    Math.min(score + (sameJP?5:0), 95)
  ];
  return {
    score,
    title: score>=80?'설레는 좋은 만남':score>=70?'가능성 있는 두 사람':'서로를 이해하는 관계',
    desc: `${a}와 ${b}의 만남은 서로에게 새로운 세계를 열어주는 특별한 관계예요. 서로 다른 부분이 오히려 매력이 되고, 함께 성장하는 커플이 될 수 있어요. 💕`,
    bars,
    tips:['서로의 다른 점을 단점이 아닌 매력으로 바라봐요','솔직한 감정 표현이 이 관계의 핵심이에요','함께하는 시간의 질을 높이는 데 집중해봐요']
  };
}

function getGrade(s){
  if(s>=93)return'💘 운명의 궁합';
  if(s>=85)return'💕 환상의 궁합';
  if(s>=75)return'💛 좋은 궁합';
  if(s>=65)return'🤝 노력하면 최고';
  return'💪 도전적인 관계';
}

  const tipsWrap = document.getElementById('tips-wrap');
  data.tips.forEach((tip,i)=>{
    tipsWrap.innerHTML += `<div class="tip-item"><div class="tip-num">${i+1}</div><div>${tip}</div></div>`;
  });

  // 점수 카운트업
  let cur=0;
  const el=document.getElementById('score-num');
  const timer=setInterval(()=>{
    cur+=2;
    if(cur>=data.score){cur=data.score;clearInterval(timer);}
    el.textContent=cur;
  },20);

  // 바 애니메이션
  setTimeout(()=>{
    ['b1','b2','b3','b4'].forEach((id,i)=>{
      const v=data.bars[i];
      document.getElementById(id).style.width=v+'%';
      document.getElementById('v'+(i+1)).textContent=v+'%';
    });
  },400);
}, 800);

// =====================================================
// 공유 / 저장
// =====================================================
const SHARE_URL = location.href;

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
async function copyLink(){
  try{await navigator.clipboard.writeText(SHARE_URL); showToast('🔗 링크가 복사되었어요!');}
  catch{showToast('🔗 링크를 복사해주세요!');}
}
function shareInstagram(){saveAsImage(); showToast('📸 이미지 저장 후 인스타에 올려보세요!');}
function shareKakao(){
  Kakao.Share.sendDefault({
    objectType:'feed',
    content:{
      title:`${me} × ${you} 궁합이 ${data.score}점!`,
      description:data.title+' 💕 나도 테스트해봐!',
      imageUrl:'https://luv-site-kr.netlify.app/og.png',
      link:{
        mobileWebUrl:'https://luv-site-kr.netlify.app/mbti.html',
        webUrl:'https://luv-site-kr.netlify.app/mbti.html'
      }
    },
    buttons:[{
      title:'나도 테스트하기 💘',
      link:{
        mobileWebUrl:'https://luv-site-kr.netlify.app/mbti.html',
        webUrl:'https://luv-site-kr.netlify.app/mbti.html'
      }
    }]
  });
}
function shareX(){
  const txt=`${me} × ${you} 궁합이 ${data.score}점! ${data.title} 💕 너도 해봐 →`;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(txt)}`,'_blank');
}
async function saveAsImage(){
  const ov=document.getElementById('save-overlay');
  ov.classList.add('show');
  try{
    const canvas=await html2canvas(document.getElementById('save-wrap'),{scale:2,useCORS:true,backgroundColor:null,logging:false});
    const a=document.createElement('a');
    a.download=`MBTI궁합_${me}x${you}_${data.score}점.png`;
    a.href=canvas.toDataURL('image/png');
    a.click();
    showToast('📥 이미지가 저장되었어요!');
  }catch(e){showToast('⚠️ 저장 중 오류가 발생했어요.');}
  finally{ov.classList.remove('show');}
}
</script>
