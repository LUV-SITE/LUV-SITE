<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>애착유형 테스트 — LUV SITE</title>
  <meta name="description" content="나의 애착유형은? 심리학 기반 20문항으로 알아보는 나의 연애 애착 스타일">
  <meta property="og:title" content="나의 애착유형은? 💝">
  <meta property="og:description" content="안정형? 불안형? 회피형? 혼란형? 지금 바로 테스트해봐요!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root{
      --pink:#ff6b9d;--pink-dark:#d63f7a;--pink-pale:#fff0f5;
      --peach:#ffb347;--purple:#a78bfa;--purple-pale:#f5f3ff;
      --teal:#2dd4bf;--teal-pale:#f0fdfa;
      --coral:#ff6b6b;--coral-pale:#fff5f5;
      --bg:#fff8fb;--text:#1a1a2e;--muted:#999;--card:#fff;
      --max:430px;--radius:20px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Gowun Dodum','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    .wrap{width:100%;max-width:var(--max);padding-bottom:70px;}

    /* 상단바 */
    .top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);position:sticky;top:0;z-index:100;border-bottom:1px solid #ffeef5;}
    .back-btn{width:36px;height:36px;border-radius:50%;border:none;background:#f5f5f5;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .top-title{font-size:15px;font-weight:700;}
    .top-right{font-size:12px;color:var(--muted);font-weight:600;}

    /* 광고 */
    .ad-slot{display:block;overflow:visible;}
    .ad-quiz{height:100px;margin:16px 16px 0;}
    .ad-top{height:50px;margin:8px 16px 0;}
    .ad-mid{height:250px;margin:16px 16px 0;}

    /* 인트로 */
    .intro{padding:24px 20px 8px;text-align:center;}
    .intro-emoji{font-size:52px;margin-bottom:12px;display:block;animation:float 3s ease-in-out infinite;}
    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
    .intro-title{font-size:22px;font-weight:800;margin-bottom:8px;line-height:1.3;}
    .intro-desc{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:20px;}
    .start-btn{display:block;width:calc(100% - 32px);margin:0 16px;padding:16px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:white;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;}
    .start-btn:active{opacity:0.85;}

    /* 진행바 */
    .progress-wrap{padding:16px 20px 0;}
    .progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px;}
    .progress-track{height:6px;background:#f0f0f0;border-radius:100px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--peach));border-radius:100px;transition:width 0.4s ease;}

    /* 질문 카드 */
    .question-wrap{padding:20px 16px 0;}
    .q-category{font-size:11px;font-weight:700;color:var(--pink);letter-spacing:1.5px;margin-bottom:8px;text-transform:uppercase;}
    .q-text{font-size:17px;font-weight:700;line-height:1.6;margin-bottom:20px;word-break:keep-all;}

    /* 리커트 척도 */
    .likert-wrap{display:flex;flex-direction:column;gap:10px;}
    .likert-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);padding:0 4px;margin-bottom:2px;}
    .likert-btns{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
    .likert-btn{
      padding:14px 4px;border-radius:14px;border:1.5px solid #f0f0f0;
      background:white;font-family:inherit;font-size:13px;font-weight:700;
      cursor:pointer;transition:all 0.15s;color:var(--muted);
      display:flex;flex-direction:column;align-items:center;gap:4px;
    }
    .likert-btn .num{font-size:16px;font-weight:800;color:var(--text);}
    .likert-btn .label{font-size:10px;}
    .likert-btn:active{transform:scale(0.95);}
    .likert-btn.selected{background:var(--pink);border-color:var(--pink);color:white;transform:scale(1.05);box-shadow:0 4px 12px rgba(255,107,157,0.3);}
    .likert-btn.selected .num{color:white;}

    /* 다음 버튼 */
    .next-btn{display:block;width:calc(100% - 32px);margin:20px 16px 0;padding:15px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:white;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;opacity:0.4;pointer-events:none;transition:all 0.2s;}
    .next-btn.active{opacity:1;pointer-events:all;}
    .next-btn.active:active{opacity:0.85;}

    /* 결과 페이지 */
    #result-page{display:none;}
    #save-wrap{background:var(--bg);padding-bottom:4px;}

    .result-header{padding:24px 20px 0;text-align:center;}
    .result-type-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:100px;font-size:12px;font-weight:700;color:white;margin-bottom:16px;}
    .result-emoji-big{font-size:64px;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite;}
    .result-type-name{font-size:26px;font-weight:800;margin-bottom:6px;}
    .result-type-sub{font-size:14px;font-weight:600;margin-bottom:16px;}
    .result-desc-box{background:rgba(255,255,255,0.8);border-radius:16px;padding:16px;margin:0 16px;font-size:14px;color:#444;line-height:1.9;text-align:left;}

    /* 점수 바 */
    .score-section{margin:16px;}
    .score-card{background:white;border-radius:var(--radius);border:1.5px solid #ffe0ec;padding:18px 20px;}
    .score-title{font-size:14px;font-weight:700;margin-bottom:14px;}
    .score-item{margin-bottom:14px;}
    .score-item:last-child{margin-bottom:0;}
    .score-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
    .score-name{font-size:13px;font-weight:600;}
    .score-val{font-size:12px;font-weight:700;padding:2px 8px;border-radius:100px;color:white;}
    .score-track{height:10px;background:#f0f0f0;border-radius:100px;overflow:hidden;}
    .score-fill{height:100%;border-radius:100px;width:0;transition:width 1.2s cubic-bezier(.25,.8,.25,1);}

    /* 특징 섹션 */
    .traits-section{margin:0 16px 16px;}
    .traits-card{background:white;border-radius:var(--radius);border:1.5px solid #ffe0ec;padding:18px 20px;}
    .traits-title{font-size:14px;font-weight:700;margin-bottom:14px;}
    .trait-item{display:flex;gap:10px;margin-bottom:12px;font-size:13px;color:#444;line-height:1.7;align-items:flex-start;}
    .trait-item:last-child{margin-bottom:0;}
    .trait-icon{font-size:18px;flex-shrink:0;margin-top:1px;}

    /* 연애 팁 */
    .tips-section{margin:0 16px 0;}
    .tips-card{background:white;border-radius:var(--radius);border:1.5px solid #ffe0ec;padding:18px 20px;}
    .tips-title{font-size:14px;font-weight:700;margin-bottom:14px;}
    .tip-item{display:flex;gap:10px;margin-bottom:10px;font-size:13px;color:#444;line-height:1.7;}
    .tip-num{background:var(--pink);color:white;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;}

    /* 워터마크 */
    .watermark{text-align:center;padding:12px 0 6px;font-size:11px;color:#ffb3cc;letter-spacing:1px;font-weight:700;}

    /* 공유/저장 버튼 */
    .action-section{margin:16px;}
    .share-label{font-size:13px;color:var(--muted);text-align:center;font-weight:600;margin-bottom:12px;}
    .share-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
    .share-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 4px;background:white;border:1px solid #f0f0f0;border-radius:14px;cursor:pointer;font-size:11px;color:var(--muted);font-family:inherit;}
    .share-btn:active{transform:scale(0.94);}
    .share-btn .icon{font-size:26px;}
    .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
    .btn-primary{padding:14px;border:none;background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:white;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
    .btn-primary:active{opacity:0.85;}
    .btn-secondary{padding:14px;border:1.5px solid var(--pink);background:white;color:var(--pink);border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
    .btn-save{width:100%;padding:14px;border:1.5px solid #e0e0e0;background:white;color:var(--text);border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;}

    /* 추천 */
    .rec-section{margin:0 16px;}
    .rec-title{font-size:16px;font-weight:700;margin-bottom:12px;}
    .rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .rec-card{background:white;border:1px solid #f0f0f0;border-radius:14px;padding:14px 12px;text-decoration:none;color:inherit;display:block;}
    .rec-card:active{transform:scale(0.97);border-color:var(--pink);}
    .rec-emoji{font-size:26px;margin-bottom:6px;display:block;}
    .rec-name{font-size:13px;font-weight:700;margin-bottom:3px;line-height:1.3;}
    .rec-sub{font-size:11px;color:var(--muted);}

    /* 토스트 */
    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,0.8);color:white;padding:10px 22px;border-radius:100px;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:9999;white-space:nowrap;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    #save-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
    #save-overlay.show{display:flex;}
    #save-overlay span{color:white;font-size:15px;font-weight:600;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* 애니메이션 */
    .fade-in{animation:fadeIn 0.3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

    /* 하단 고정 광고 */
    .sticky-ad{
      position:fixed;bottom:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:430px;height:50px;z-index:999;
      background:white;border-top:1px solid #f0f0f0;
      display:flex;align-items:center;justify-content:center;
      overflow:visible;
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="top-bar">
    <button class="back-btn" onclick="location.href='index.html'">←</button>
    <span class="top-title">💝 애착유형 테스트</span>
    <span class="top-right" id="progress-text"></span>
  </div>

  <!-- 인트로 -->
  <div id="intro-page">
    <div class="intro">
      <span class="intro-emoji">💝</span>
      <div class="intro-title">나의 애착유형은<br>무엇일까요?</div>
      <div class="intro-desc">
        심리학자 존 볼비의 애착이론 기반<br>
        20문항으로 알아보는 나의 연애 애착 스타일<br>
        <br>
        <strong>안정형 · 불안형 · 회피형 · 혼란형</strong><br>
        4가지 유형 중 나는 어떤 타입일까요?
      </div>
    </div>
    <button class="start-btn" onclick="startTest()">💝 테스트 시작하기</button>
    <!-- 광고 상단 -->
    <div class="ad-slot ad-top" style="margin-top:16px;">
      <ins class="kakao_ad_area" style="display:none;"
        data-ad-unit="DAN-o5cKltKE4qe54NrF"
        data-ad-width="320"
        data-ad-height="50"></ins>
      <script type="text/javascript" src="//t1.kakaocdn.net/kas/static/ba.min.js" async></script>
    </div>
  </div>

  <!-- 질문 페이지 -->
  <div id="quiz-page" style="display:none;">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="q-num">1 / 20</span>
        <span id="q-percent">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="question-wrap fade-in" id="question-wrap">
      <div class="q-category" id="q-category"></div>
      <div class="q-text" id="q-text"></div>
      <div class="likert-wrap">
        <div class="likert-labels">
          <span>전혀 아니다</span>
          <span>매우 그렇다</span>
        </div>
        <div class="likert-btns" id="likert-btns"></div>
      </div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 →</button>

    <!-- 질문 하단 광고 (320×100) -->
    <div class="ad-slot ad-quiz">
      <ins class="kakao_ad_area" style="display:none;"
        data-ad-unit="DAN-KaaDz3x8sCk02Fgp"
        data-ad-width="320"
        data-ad-height="100"></ins>
      <script type="text/javascript" src="//t1.kakaocdn.net/kas/static/ba.min.js" async></script>
    </div>
  </div>

  <!-- 결과 페이지 -->
  <div id="result-page">
    <div id="save-wrap">
      <div class="result-header" id="result-header"></div>
      <div class="result-desc-box" id="result-desc-box"></div>
      <div class="score-section">
        <div class="score-card">
          <div class="score-title">📊 나의 애착 성향 분석</div>
          <div id="score-bars"></div>
        </div>
      </div>
      <div class="traits-section">
        <div class="traits-card">
          <div class="traits-title">🔍 나의 주요 특징</div>
          <div id="traits-list"></div>
        </div>
      </div>
      <div class="tips-section">
        <div class="tips-card">
          <div class="tips-title">💡 건강한 연애를 위한 조언</div>
          <div id="tips-list"></div>
        </div>
      </div>
      <div class="watermark">💗 LUV SITE</div>
    </div>

    <!-- 광고 중간 -->
    <div class="ad-slot ad-mid">
      <ins class="kakao_ad_area" style="display:none;"
        data-ad-unit="DAN-KaaDz3x8sCk02Fgp"
        data-ad-width="320"
        data-ad-height="100"></ins>
      <script type="text/javascript" src="//t1.kakaocdn.net/kas/static/ba.min.js" async></script>
    </div>

    <div class="action-section">
      <div class="share-label">결과 공유하기 💌</div>
      <div class="share-grid">
        <button class="share-btn" onclick="shareKakao()"><span class="icon">💬</span>카카오</button>
        <button class="share-btn" onclick="shareInstagram()"><span class="icon">📸</span>인스타</button>
        <button class="share-btn" onclick="shareX()"><span class="icon">🐦</span>X</button>
        <button class="share-btn" onclick="copyLink()"><span class="icon">🔗</span>링크복사</button>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="restartTest()">🔄 다시하기</button>
        <button class="btn-secondary" onclick="location.href='index.html'">🏠 다른 테스트</button>
      </div>
      <button class="btn-save" onclick="saveAsImage()">📥 이미지로 저장하기</button>
    </div>

    <div class="rec-section" style="margin-top:16px;">
      <div class="rec-title">🎯 이런 테스트도 해보세요</div>
      <div class="rec-grid">
        <a class="rec-card" href="mbti.html">
          <span class="rec-emoji">💑</span>
          <div class="rec-name">MBTI 궁합 테스트</div>
          <div class="rec-sub">두 사람의 찐 궁합은?</div>
        </a>
        <a class="rec-card" href="index.html">
          <span class="rec-emoji">✨</span>
          <div class="rec-name">다른 테스트 보기</div>
          <div class="rec-sub">더 많은 테스트</div>
        </a>
      </div>

</div>

<div id="toast"></div>
<div id="save-overlay">
  <div style="width:48px;height:48px;border:3px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
  <span>이미지 저장 중...</span>
</div>

<script>
// =====================================================
// 심리학 기반 20문항 (불안 10문항 + 회피 10문항)
// 존 볼비 애착이론 + ECR(경험적 친밀관계 척도) 기반
// =====================================================
const QUESTIONS = [
  // 불안 척도 (Anxiety) — 버림받음 공포, 집착
  {id:1, type:'anxiety', category:'관계 불안', text:'연인에게 연락이 오지 않으면 불안하고 걱정이 된다.'},
  {id:2, type:'anxiety', category:'관계 불안', text:'연인이 나를 정말 사랑하는지 자주 의심이 든다.'},
  {id:3, type:'anxiety', category:'버림받음 공포', text:'연인이 나를 떠날 것 같은 두려움을 자주 느낀다.'},
  {id:4, type:'anxiety', category:'버림받음 공포', text:'연인이 다른 사람에게 관심을 보이면 심하게 불안해진다.'},
  {id:5, type:'anxiety', category:'관계 집착', text:'연인과 함께 있을 때도 충분히 가깝다는 느낌이 들지 않는다.'},
  {id:6, type:'anxiety', category:'관계 집착', text:'연인이 나를 원하는 만큼 원하지 않는 것 같아 걱정된다.'},
  {id:7, type:'anxiety', category:'감정 기복', text:'연인의 작은 행동 하나에도 감정이 크게 흔들린다.'},
  {id:8, type:'anxiety', category:'감정 기복', text:'연인에게 거절당하는 것이 너무 두려워 내 감정을 숨길 때가 있다.'},
  {id:9, type:'anxiety', category:'확인 욕구', text:'연인에게 사랑받고 있다는 확인을 자주 받고 싶다.'},
  {id:10, type:'anxiety', category:'확인 욕구', text:'연인이 나에게 화났을 때 어떻게든 빨리 해결하려고 한다.'},

  // 회피 척도 (Avoidance) — 친밀감 회피, 독립 과잉
  {id:11, type:'avoidance', category:'친밀감 회피', text:'연인에게 내 감정을 솔직하게 표현하는 것이 불편하다.'},
  {id:12, type:'avoidance', category:'친밀감 회피', text:'연인과 너무 가까워지면 오히려 불편하고 답답하다.'},
  {id:13, type:'avoidance', category:'의존 거부', text:'연인에게 도움을 요청하거나 의지하는 것이 어렵다.'},
  {id:14, type:'avoidance', category:'의존 거부', text:'연인이 내 일에 관여하려 하면 거리를 두고 싶어진다.'},

// =====================================================
// 테스트 로직
// =====================================================
let currentQ = 0;
let answers = [];
let selectedAnswer = null;
let resultType = null;

const LIKERT_LABELS = ['전혀\n아니다','아니다','보통','그렇다','매우\n그렇다'];

function startTest(){
  document.getElementById('intro-page').style.display='none';
  document.getElementById('quiz-page').style.display='block';
  document.getElementById('progress-text').textContent='1/20';
  renderQuestion();
}

function renderQuestion(){
  const q = QUESTIONS[currentQ];
  const wrap = document.getElementById('question-wrap');
  wrap.classList.remove('fade-in');
  void wrap.offsetWidth;
  wrap.classList.add('fade-in');

  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-num').textContent = `${currentQ+1} / ${QUESTIONS.length}`;
  document.getElementById('q-percent').textContent = Math.round((currentQ/QUESTIONS.length)*100)+'%';
  document.getElementById('progress-fill').style.width = (currentQ/QUESTIONS.length*100)+'%';
  document.getElementById('progress-text').textContent = `${currentQ+1}/20`;

  // 리커트 버튼
  const container = document.getElementById('likert-btns');
  container.innerHTML = '';
  for(let i=1;i<=5;i++){
    const btn = document.createElement('button');
    btn.className = 'likert-btn' + (answers[currentQ]===i?' selected':'');
    btn.innerHTML = `<span class="num">${i}</span><span class="label">${LIKERT_LABELS[i-1].replace('\n','<br>')}</span>`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  }

  selectedAnswer = answers[currentQ] || null;
  updateNextBtn();
}

function selectAnswer(val){
  selectedAnswer = val;
  answers[currentQ] = val;
  document.querySelectorAll('.likert-btn').forEach((btn,i)=>{
    btn.classList.toggle('selected', i+1===val);
  });
  updateNextBtn();

  // 자동 다음 (0.4초 후)
  setTimeout(()=>{
    if(answers[currentQ]) nextQuestion();
  }, 400);
}

function updateNextBtn(){
  const btn = document.getElementById('next-btn');
  btn.classList.toggle('active', !!selectedAnswer);
  btn.textContent = currentQ===QUESTIONS.length-1 ? '결과 보기 💝' : '다음 →';
}

function nextQuestion(){
  if(!answers[currentQ]) return;
  if(currentQ < QUESTIONS.length-1){
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

// =====================================================
// 결과 계산
// =====================================================
function showResult(){
  // 불안 / 회피 점수 계산
  let anxietyScore = 0, avoidanceScore = 0;
  QUESTIONS.forEach((q,i)=>{
    if(q.type==='anxiety') anxietyScore += (answers[i]||3);
    else avoidanceScore += (answers[i]||3);
  });

  // 정규화 (10~50점 → 0~100%)
  const aP = Math.round((anxietyScore-10)/40*100);
  const vP = Math.round((avoidanceScore-10)/40*100);
  const anxHigh = aP >= 50;
  const avoHigh = vP >= 50;

  // 유형 결정
  if(!anxHigh && !avoHigh) resultType = 'secure';
  else if(anxHigh && !avoHigh) resultType = 'anxious';
  else if(!anxHigh && avoHigh) resultType = 'avoidant';
  else resultType = 'disorganized';

  const R = RESULTS[resultType];

  // 페이지 전환
  document.getElementById('quiz-page').style.display='none';
  document.getElementById('result-page').style.display='block';
  document.getElementById('progress-text').textContent='완료!';

  // 헤더
  document.getElementById('result-header').innerHTML = `
    <div style="margin-bottom:6px;">
      <span class="result-type-badge" style="background:${R.color};">${R.badge}</span>
    </div>
    <span class="result-emoji-big">${R.bigEmoji}</span>
    <div class="result-type-name">${R.name}</div>
    <div class="result-type-sub" style="color:${R.color};">${R.sub}</div>
  `;

  // 설명
  document.getElementById('result-desc-box').innerHTML = R.desc.replace(/\n/g,'<br>');

  // 점수 바
  const barsData = [
    {label:'불안 지수', val:aP, color:'#f59e0b'},
    {label:'회피 지수', val:vP, color:'#3b82f6'},
    {label:'안정 지수', val:Math.max(0,100-Math.round((aP+vP)/2)), color:'#22c55e'},
  ];
  const barsHTML = barsData.map(b=>`
    <div class="score-item">
      <div class="score-label-row">
        <span class="score-name">${b.label}</span>
        <span class="score-val" style="background:${b.color};">${b.val}%</span>
      </div>
      <div class="score-track">
        <div class="score-fill" style="background:${b.color};width:0%" data-width="${b.val}%"></div>
      </div>
    </div>
  `).join('');
  document.getElementById('score-bars').innerHTML = barsHTML;

  // 특징
  document.getElementById('traits-list').innerHTML = R.traits.map(t=>`
    <div class="trait-item"><span class="trait-icon">${t.icon}</span><span>${t.text}</span></div>
  `).join('');

  // 팁
  document.getElementById('tips-list').innerHTML = R.tips.map((t,i)=>`
    <div class="tip-item"><div class="tip-num">${i+1}</div><div>${t}</div></div>
  `).join('');

  // 바 애니메이션
  setTimeout(()=>{
    document.querySelectorAll('.score-fill').forEach(el=>{
      el.style.width = el.dataset.width;
    });
  }, 400);

  window.scrollTo({top:0, behavior:'smooth'});
}

// =====================================================
// 공유 / 저장
// =====================================================
function restartTest(){
  currentQ=0; answers=[]; selectedAnswer=null; resultType=null;
  document.getElementById('result-page').style.display='none';
  document.getElementById('quiz-page').style.display='none';
  document.getElementById('intro-page').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function shareKakao(){
  const R = RESULTS[resultType||'secure'];
  const text = `나의 애착유형은 "${R.name}"이래요! ${R.sub} 💝\n너는 어떤 유형이야? 👇\n${location.href}`;
  if(navigator.share){
    navigator.share({title:`나의 애착유형은 ${R.name}!`, text, url:location.href});
  } else {
    copyLink();
    showToast('💬 링크를 복사했어요!');
  }
}
function shareInstagram(){ saveAsImage(); showToast('📸 이미지 저장 후 인스타에 올려보세요!'); }
function shareX(){
  const R = RESULTS[resultType||'secure'];
  const txt = `나의 애착유형은 "${R.name}"! ${R.sub} 💝 너도 해봐 →`;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(txt+' '+location.href)}`,'_blank');
}
async function copyLink(){
  try{ await navigator.clipboard.writeText(location.href); showToast('🔗 링크가 복사되었어요!'); }
  catch{ showToast('🔗 링크를 복사해주세요!'); }
}
async function saveAsImage(){
  const ov=document.getElementById('save-overlay');
  ov.classList.add('show');
  try{
    const canvas=await html2canvas(document.getElementById('save-wrap'),{scale:2,useCORS:true,backgroundColor:null,logging:false});
    const a=document.createElement('a');
    a.download=`애착유형_${RESULTS[resultType||'secure'].name}.png`;
    a.href=canvas.toDataURL('image/png');
    a.click();
    showToast('📥 이미지가 저장되었어요!');
  }catch(e){ showToast('⚠️ 저장 중 오류가 발생했어요.'); }
  finally{ ov.classList.remove('show'); }
}
