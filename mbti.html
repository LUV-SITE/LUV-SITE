<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MBTI 궁합 테스트 — LUV SITE</title>
  <meta name="description" content="두 사람의 MBTI를 입력하면 궁합 점수와 상세 분석을 알려드려요!">
  <meta property="og:title" content="MBTI 궁합 테스트">
  <meta property="og:description" content="우리 궁합은 몇 점일까? MBTI로 알아보기">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #ff6b9d;
      --pink-soft: #ff8fb3;
      --pink-pale: #fff0f5;
      --peach: #ffb347;
      --blue: #6b9dff;
      --blue-pale: #f0f4ff;
      --bg: #fff8fb;
      --text: #1a1a2e;
      --muted: #999;
      --card: #ffffff;
      --max: 430px;
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Gowun Dodum', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    }
    .wrap { width: 100%; max-width: var(--max); padding-bottom: 60px; }

    /* 상단 바 */
    .top-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid #ffeef5;
    }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: none; background: #f5f5f5; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .top-title { font-size: 16px; font-weight: 700; }

    /* 광고 슬롯 */
    .ad-slot{
        background:transparent;
        border:none;
        display:block;
        overflow:visible;
            }
    .ad-top{height:50px;margin:8px 16px 0;}
    .ad-mid{height:250px;margin:16px;}
    .ad-native{height:100px;margin:0 16px 16px;}

    /* 섹션 카드 */
    .section {
      margin: 0 16px 16px;
      background: var(--card);
      border-radius: var(--radius);
      border: 1.5px solid #ffe0ec;
      padding: 20px;
    }
    .section-label {
      font-size: 13px; font-weight: 700; margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-label.me { color: var(--pink); }
    .section-label.you { color: var(--blue); }

    /* MBTI 그리드 */
    .mbti-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px;
    }
    .mbti-btn {
      padding: 10px 4px; border-radius: 12px;
      border: 1.5px solid #f0f0f0; background: white;
      font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; color: var(--text);
      letter-spacing: 0.5px;
    }
    .mbti-btn:active { transform: scale(0.93); }

    /* 내 MBTI 선택됨 */
    .mbti-btn.selected-me {
      background: var(--pink); color: white; border-color: var(--pink);
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(255,107,157,0.3);
    }
    /* 상대 MBTI 선택됨 */
    .mbti-btn.selected-you {
      background: var(--blue); color: white; border-color: var(--blue);
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(107,157,255,0.3);
    }

    /* 선택된 표시 */
    .selected-display {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; margin: 16px 16px 0;
      padding: 16px; background: var(--card);
      border-radius: var(--radius); border: 1.5px solid #ffe0ec;
    }
    .selected-box {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .selected-box .label { font-size: 11px; color: var(--muted); }
    .selected-box .value {
      font-size: 24px; font-weight: 700;
      min-width: 80px; text-align: center;
      padding: 8px 12px; border-radius: 12px;
    }
    .value.me { background: var(--pink-pale); color: var(--pink); }
    .value.you { background: var(--blue-pale); color: var(--blue); }
    .vs { font-size: 20px; font-weight: 700; color: var(--muted); padding-top: 20px; }

    /* 결과 보기 버튼 */
    .result-btn {
      display: block; width: calc(100% - 32px); margin: 16px;
      padding: 16px; border: none; border-radius: var(--radius);
      background: linear-gradient(135deg, var(--pink), #ff3d7a);
      color: white; font-family: inherit; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
      opacity: 0.4; pointer-events: none;
    }
    .result-btn.active { opacity: 1; pointer-events: all; }
    .result-btn.active:active { opacity: 0.85; transform: scale(0.98); }

    /* 힌트 텍스트 */
    .hint {
      text-align: center; font-size: 12px; color: var(--muted);
      margin: -8px 16px 0; padding-bottom: 4px;
    }
  </style>
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
<script>
  Kakao.init('5e4c791f246bd00a0fe3bf0516396a9a');
</script>
</head>
<body>
<div class="wrap">

  <!-- 상단 바 -->
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='index.html'">←</button>
    <span class="top-title">💑 MBTI 궁합 테스트</span>
  </div>

  <!-- 광고 슬롯 ① -->
<div class="ad-slot ad-top" id="ad-top">
  <ins class="kakao_ad_area" style="display:none;"
    data-ad-unit="AN-6iw5gO4mKLgRJllI"
    data-ad-width="320"
    data-ad-height="50"></ins>
  <script type="text/javascript"
    src="//t1.kakaocdn.net/kas/static/ba.min.js" async></script>
</div>

  <!-- 선택 현황 표시 -->
  <div class="selected-display">
    <div class="selected-box">
      <span class="label">나의 MBTI</span>
      <div class="value me" id="display-me">?</div>
    </div>
    <div class="vs">💗</div>
    <div class="selected-box">
      <span class="label">상대방 MBTI</span>
      <div class="value you" id="display-you">?</div>
    </div>
  </div>

  <!-- 나의 MBTI -->
  <div class="section" style="margin-top:16px;">
    <div class="section-label me">🩷 나의 MBTI를 선택하세요</div>
    <div class="mbti-grid" id="grid-me"></div>
  </div>

  <!-- 상대방 MBTI -->
  <div class="section">
    <div class="section-label you">💙 상대방 MBTI를 선택하세요</div>
    <div class="mbti-grid" id="grid-you"></div>
  </div>

  <!-- 광고 슬롯 ② -->
<div class="ad-slot ad-mid">
    <ins class="kakao_ad_area" style="display:none;"
    data-ad-unit = "DAN-scTitgt243zKHDwP"
    data-ad-width = "320"
    data-ad-height = "100"></ins>
    <script type="text/javascript" src="//t1.kakaocdn.net/kas/static/ba.min.js" async></script>
</div>

  <p class="hint">두 가지 모두 선택하면 결과를 볼 수 있어요 💕</p>

  <!-- 결과 보기 버튼 -->
  <button class="result-btn" id="result-btn" onclick="goResult()">
    💘 궁합 결과 보기
  </button>

</div>

<script>
const MBTI_LIST = [
  'INTJ','INTP','ENTJ','ENTP',
  'INFJ','INFP','ENFJ','ENFP',
  'ISTJ','ISFJ','ESTJ','ESFJ',
  'ISTP','ISFP','ESTP','ESFP'
];

let selectedMe = null;
let selectedYou = null;

// 그리드 생성
function buildGrid(gridId, type) {
  const grid = document.getElementById(gridId);
  MBTI_LIST.forEach(mbti => {
    const btn = document.createElement('button');
    btn.className = 'mbti-btn';
    btn.textContent = mbti;
    btn.onclick = () => selectMBTI(mbti, type);
    grid.appendChild(btn);
  });
}

buildGrid('grid-me', 'me');
buildGrid('grid-you', 'you');

function selectMBTI(mbti, type) {
  if (type === 'me') {
    selectedMe = mbti;
    document.querySelectorAll('#grid-me .mbti-btn').forEach(b => {
      b.classList.remove('selected-me');
      if (b.textContent === mbti) b.classList.add('selected-me');
    });
    document.getElementById('display-me').textContent = mbti;
  } else {
    selectedYou = mbti;
    document.querySelectorAll('#grid-you .mbti-btn').forEach(b => {
      b.classList.remove('selected-you');
      if (b.textContent === mbti) b.classList.add('selected-you');
    });
    document.getElementById('display-you').textContent = mbti;
  }

  // 둘 다 선택되면 버튼 활성화
  const btn = document.getElementById('result-btn');
  if (selectedMe && selectedYou) {
    btn.classList.add('active');
    btn.textContent = `💘 ${selectedMe} × ${selectedYou} 궁합 보기`;
  }
}

function goResult() {
  if (!selectedMe || !selectedYou) return;
  location.href = `result.html?me=${selectedMe}&you=${selectedYou}`;
}
</script>
</body>
</html>
