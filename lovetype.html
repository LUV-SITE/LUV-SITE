<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>나의 연애 유형 테스트 — LUV SITE</title>
  <meta name="description" content="나는 연애할 때 어떤 유형? 10문항으로 알아보는 나의 리얼 연애 스타일!">
  <meta property="og:title" content="나의 연애 유형은? 💘">
  <meta property="og:description" content="츤데레? 집착왕? 쿨가이? 10문항으로 알아보는 나의 리얼 연애 스타일!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root{
      --pink:#ff6b9d;--pink-dark:#d63f7a;--pink-pale:#fff0f5;
      --peach:#ffb347;--bg:#fff8fb;--text:#1a1a2e;--muted:#999;
      --card:#fff;--max:430px;--radius:20px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Gowun Dodum','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    .wrap{width:100%;max-width:var(--max);padding-bottom:70px;}

    /* 상단바 */
    .top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);position:sticky;top:0;z-index:100;border-bottom:1px solid #ffeef5;}
    .back-btn{width:36px;height:36px;border-radius:50%;border:none;background:#f5f5f5;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .top-title{font-size:15px;font-weight:700;}
    .top-right{font-size:12px;color:var(--muted);font-weight:600;}

    /* 광고 */
    .ad-slot{display:block;overflow:visible;}
    .ad-top{height:50px;margin:8px 16px 0;}
    .ad-quiz{height:100px;margin:16px 16px 0;}
    .ad-mid{height:100px;margin:16px;}

    /* 인트로 */
    .intro{padding:28px 20px 16px;text-align:center;}
    .intro-emoji{font-size:56px;margin-bottom:14px;display:block;animation:float 3s ease-in-out infinite;}
    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
    .intro-title{font-size:24px;font-weight:800;margin-bottom:10px;line-height:1.3;}
    .intro-desc{font-size:13px;color:var(--muted);line-height:1.9;margin-bottom:6px;}
    .type-preview{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:16px 16px 20px;}
    .type-chip{background:white;border:1.5px solid #ffe0ec;border-radius:12px;padding:10px 8px;text-align:center;font-size:12px;font-weight:700;}
    .type-chip .chip-emoji{font-size:22px;display:block;margin-bottom:4px;}
    .start-btn{display:block;width:calc(100% - 32px);margin:0 16px 16px;padding:16px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:white;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;}
    .start-btn:active{opacity:0.85;}

    /* 진행바 */
    .progress-wrap{padding:16px 20px 0;}
    .progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px;}
    .progress-track{height:6px;background:#f0f0f0;border-radius:100px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--peach));border-radius:100px;transition:width 0.4s ease;}

    /* 질문 */
    .question-wrap{padding:20px 16px 0;}
    .q-num-badge{display:inline-block;background:var(--pink);color:white;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;margin-bottom:10px;}
    .q-text{font-size:17px;font-weight:700;line-height:1.7;margin-bottom:20px;word-break:keep-all;}

    /* 선택지 */
    .choices{display:flex;flex-direction:column;gap:10px;}
    .choice-btn{
      padding:14px 16px;border-radius:14px;border:1.5px solid #f0f0f0;
      background:white;font-family:inherit;font-size:14px;font-weight:600;
      cursor:pointer;transition:all 0.15s;color:var(--text);
      text-align:left;line-height:1.5;
    }
    .choice-btn:active{transform:scale(0.98);}
    .choice-btn.selected{background:var(--pink-pale);border-color:var(--pink);color:var(--pink);}

    /* 다음 버튼 */
    .next-btn{display:block;width:calc(100% - 32px);margin:16px;padding:15px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:white;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;opacity:0.4;pointer-events:none;transition:all 0.2s;}
    .next-btn.active{opacity:1;pointer-events:all;}
    .next-btn.active:active{opacity:0.85;}

    /* 결과 */
    #result-page{display:none;}
    #save-wrap{background:var(--bg);padding-bottom:8px;}
    .result-top{padding:28px 20px 0;text-align:center;}
    .result-badge{display:inline-block;padding:5px 16px;border-radius:100px;font-size:12px;font-weight:700;color:white;margin-bottom:14px;}
    .result-emoji-big{font-size:68px;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite;}
    .result-name{font-size:26px;font-weight:800;margin-bottom:6px;}
    .result-sub{font-size:14px;font-weight:600;margin-bottom:4px;}
    .result-tag{font-size:12px;color:var(--muted);margin-bottom:20px;}

    .result-desc-card{margin:0 16px 12px;background:white;border-radius:var(--radius);border:1.5px solid #ffe0ec;padding:18px 20px;font-size:14px;color:#444;line-height:1.9;}
    .result-desc-card .highlight{color:var(--pink);font-weight:700;}

    /* 특징 카드 */
    .feature-card{margin:0 16px 12px;background:white;border-radius:var(--radius);border:1.5px solid #ffe0ec;padding:18px 20px;}
    .feature-title{font-size:14px;font-weight:700;margin-bottom:14px;}
    .feature-item{display:flex;gap:10px;margin-bottom:10px;font-size:13px;color:#444;line-height:1.7;align-items:flex-start;}
    .feature-item:last-child{margin-bottom:0;}
    .feature-icon{font-size:18px;flex-shrink:0;}

    /* 궁합 카드 */
    .compat-card{margin:0 16px 12px;background:white;border-radius:var(--radius);border:1.5px solid #ffe0ec;padding:18px 20px;}
    .compat-title{font-size:14px;font-weight:700;margin-bottom:14px;}
    .compat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .compat-item{text-align:center;padding:12px 8px;border-radius:14px;}
    .compat-item.good{background:#fff0f5;}
    .compat-item.bad{background:#f5f5f5;}
    .compat-emoji{font-size:28px;display:block;margin-bottom:4px;}
    .compat-name{font-size:13px;font-weight:700;margin-bottom:2px;}
    .compat-sub{font-size:11px;color:var(--muted);}

    /* 워터마크 */
    .watermark{text-align:center;padding:12px 0 6px;font-size:11px;color:#ffb3cc;letter-spacing:1px;font-weight:700;}

    /* 공유/저장 */
    .action-section{margin:0 16px;}
    .share-label{font-size:13px;color:var(--muted);text-align:center;font-weight:600;margin-bottom:12px;}
    .share-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
    .share-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 4px;background:white;border:1px solid #f0f0f0;border-radius:14px;cursor:pointer;font-size:11px;color:var(--muted);font-family:inherit;}
    .share-btn:active{transform:scale(0.94);}
    .share-btn .icon{font-size:26px;}
    .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
    .btn-primary{padding:14px;border:none;background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:white;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
    .btn-primary:active{opacity:0.85;}
    .btn-secondary{padding:14px;border:1.5px solid var(--pink);background:white;color:var(--pink);border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
    .btn-save{width:100%;padding:14px;border:1.5px solid #e0e0e0;background:white;color:var(--text);border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;}

    /* 추천 */
    .rec-section{margin:16px 16px 0;}
    .rec-title{font-size:16px;font-weight:700;margin-bottom:12px;}
    .rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .rec-card{background:white;border:1px solid #f0f0f0;border-radius:14px;padding:14px 12px;text-decoration:none;color:inherit;display:block;}
    .rec-card:active{transform:scale(0.97);border-color:var(--pink);}
    .rec-emoji{font-size:26px;margin-bottom:6px;display:block;}
    .rec-name{font-size:13px;font-weight:700;margin-bottom:3px;line-height:1.3;}
    .rec-sub{font-size:11px;color:var(--muted);}

    /* 하단 고정 광고 */
    .sticky-ad{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:50px;z-index:999;background:white;border-top:1px solid #f0f0f0;display:flex;align-items:center;justify-content:center;overflow:visible;}

    /* 토스트 */
    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,0.8);color:white;padding:10px 22px;border-radius:100px;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:9999;white-space:nowrap;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    #save-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
    #save-overlay.show{display:flex;}
    #save-overlay span{color:white;font-size:15px;font-weight:600;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .fade-in{animation:fadeIn 0.3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  </style>
</head>
<body>
<div class="wrap">

  <div class="top-bar">

  <!-- 질문 -->

<script>
// =====================================================
// 10문항 — 각 문항 4개 선택지, 유형별 점수
// 유형: ice(쿨한척) / pure(순수멍멍) / storm(감정롤러) / tsun(츤데레) / game(밀당고수) / sunny(에너자이저)
// =====================================================
const QUESTIONS = [
  {
    text: "좋아하는 사람에게 연락이 안 올 때 나는?",
    choices: [
      {text: "😎 뭐 바쁘겠지~ 나도 바쁜데", type:'ice'},

      {text: "☀️ 먼저 연락하면 되지! (바로 전화)", type:'sunny'},
    ]
  },
  {
    text: "데이트 장소를 정할 때 나는?",
    choices: [
      {text: "😎 어디든 상관없어, 니가 정해", type:'ice'},
      {text: "🥺 어디가 좋을까요...? 다 좋아요 진짜로요", type:'pure'},
      {text: "😤 내가 다 알아봤어! 여기 가자! (완벽 플래닝)", type:'storm'},
      {text: "🎭 모르겠어 (사실 다 정해놓음)", type:'tsun'},
      {text: "🔮 '어디 가고 싶어?' 물어보고 반응 보는 중", type:'game'},
      {text: "☀️ 신나는 곳! 처음 가보는 곳! 맛집! 다!", type:'sunny'},
    ]
  },
  {
    text: "연인이 '나 좋아해?' 라고 물어봤을 때?",

      {text: "😎 ...응 (2초 침묵 후)", type:'ice'},
      {text: "🥺 응!! 많이!! 진짜로!! (눈 반짝)", type:'pure'},
      {text: "😤 당연하지!! 물어보는 게 이상한 거 아니야?!", type:'storm'},

      {text: "☀️ 응!! 너무너무 좋아!! (포옹 추가)", type:'sunny'},
    ]
  },
  {
    text: "싸우고 나서 화해할 때 나는?",
    choices: [
      {text: "😎 시간이 지나면 풀리겠지... (먼저 연락 X)", type:'ice'},
      {text: "🥺 내가 잘못한 것 같아서 먼저 사과함", type:'pure'},
      {text: "😤 감정 폭발 후 후회하고 먼저 연락", type:'storm'},
      {text: "🎭 (속으로 미안한데) 근처를 어슬렁거림", type:'tsun'},

    ]
  },
  {
    text: "연인의 SNS에 이성 친구 댓글이 달렸을 때?",
    choices: [
      {text: "😎 쿨하게 무시 (속으로는 누구야...?)", type:'ice'},
      {text: "🥺 혹시 저 사람이 더 좋은 건 아니겠지...?", type:'pure'},

// 테스트 로직
// =====================================================
let currentQ = 0;
let answers = [];
let selectedAnswer = null;
let resultType = null;

function startTest(){
  document.getElementById('intro-page').style.display='none';
  document.getElementById('quiz-page').style.display='block';
  document.getElementById('progress-text').textContent='1/10';

  // 질문 광고 동적 로드
  const adWrap = document.getElementById('quiz-ad-wrap');
  adWrap.innerHTML = `<ins class="kakao_ad_area" style="display:none;"
    data-ad-unit="DAN-KaaDz3x8sCk02Fgp"
    data-ad-width="320" data-ad-height="100"></ins>`;
  const s = document.createElement('script');
  s.src = '//t1.kakaocdn.net/kas/static/ba.min.js'; s.async=true;
  adWrap.appendChild(s);

  renderQuestion();
}

function renderQuestion(){
  const q = QUESTIONS[currentQ];
  const wrap = document.getElementById('question-wrap');
  wrap.classList.remove('fade-in'); void wrap.offsetWidth; wrap.classList.add('fade-in');

  document.getElementById('q-badge').textContent = `Q${currentQ+1}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-num').textContent = `${currentQ+1} / ${QUESTIONS.length}`;
  document.getElementById('q-percent').textContent = Math.round((currentQ/QUESTIONS.length)*100)+'%';
  document.getElementById('progress-fill').style.width = (currentQ/QUESTIONS.length*100)+'%';
  document.getElementById('progress-text').textContent = `${currentQ+1}/10`;

  const container = document.getElementById('choices');
  container.innerHTML = '';
  q.choices.forEach((c,i)=>{
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (answers[currentQ]===i?' selected':'');
    btn.textContent = c.text;
    btn.onclick = () => selectAnswer(i, c.type);
    container.appendChild(btn);
  });

  selectedAnswer = answers[currentQ] !== undefined ? answers[currentQ] : null;
  updateNextBtn();
}

function selectAnswer(idx, type){
  selectedAnswer = idx;
  answers[currentQ] = idx;
  document.querySelectorAll('.choice-btn').forEach((btn,i)=>{
    btn.classList.toggle('selected', i===idx);
  });
  updateNextBtn();
  setTimeout(()=>{ if(answers[currentQ]!==undefined) nextQuestion(); }, 400);
}

function updateNextBtn(){
  const btn = document.getElementById('next-btn');
  btn.classList.toggle('active', selectedAnswer!==null);
  btn.textContent = currentQ===QUESTIONS.length-1 ? '결과 보기 💘' : '다음 →';
}

function nextQuestion(){
  if(answers[currentQ]===undefined) return;
  if(currentQ < QUESTIONS.length-1){ currentQ++; renderQuestion(); }
  else showResult();
}

// 결과 계산
// =====================================================
function showResult(){
  const scores = {ice:0, pure:0, storm:0, tsun:0, game:0, sunny:0};
  QUESTIONS.forEach((q,i)=>{
    if(answers[i]!==undefined) scores[q.choices[answers[i]].type]++;
  });

  resultType = Object.keys(scores).reduce((a,b)=>scores[a]>=scores[b]?a:b);
  const R = RESULTS[resultType];

  document.getElementById('quiz-page').style.display='none';
  document.getElementById('result-page').style.display='block';
  document.getElementById('progress-text').textContent='완료!';

  // 결과 상단
  document.getElementById('result-top').innerHTML = `
    <div style="margin-bottom:6px;">
      <span class="result-badge" style="background:${R.color};">${R.badge}</span>
    </div>
    <span class="result-emoji-big">${R.emoji}</span>
    <div class="result-name">${R.name}</div>
    <div class="result-sub" style="color:${R.color};">${R.sub}</div>
    <div class="result-tag">${R.tags}</div>
  `;

  // 설명
  document.getElementById('result-desc').innerHTML = R.desc.replace(/\n/g,'<br>');

  // 특징
  document.getElementById('feature-list').innerHTML = R.features.map(f=>`
    <div class="feature-item"><span class="feature-icon">${f.icon}</span><span>${f.text}</span></div>
  `).join('');

  // 궁합
  document.getElementById('compat-row').innerHTML = `
    <div class="compat-item good">
      <span class="compat-emoji">${R.good.emoji}</span>
      <div class="compat-name">💕 잘 맞아요</div>
      <div class="compat-sub">${R.good.name}</div>
      <div class="compat-sub" style="margin-top:4px;">${R.good.reason}</div>
    </div>
    <div class="compat-item bad">
      <span class="compat-emoji">${R.bad.emoji}</span>
      <div class="compat-name">💦 힘들 수 있어요</div>
      <div class="compat-sub">${R.bad.name}</div>
      <div class="compat-sub" style="margin-top:4px;">${R.bad.reason}</div>
    </div>
  `;

  // 결과 상단 50 광고 동적 로드
  const rTopAd = document.getElementById('result-top-ad');
  rTopAd.innerHTML = `<ins class="kakao_ad_area" style="display:none;"
    data-ad-unit="DAN-o5cKltKE4qe54NrF"
    data-ad-width="320" data-ad-height="50"></ins>`;
  const rt = document.createElement('script');
  rt.src = '//t1.kakaocdn.net/kas/static/ba.min.js'; rt.async=true;
  rTopAd.appendChild(rt);

  // 결과 중간 100 광고 동적 로드
  const rAdWrap = document.getElementById('result-ad-wrap');
  rAdWrap.innerHTML = `<ins class="kakao_ad_area" style="display:none;"
    data-ad-unit="DAN-KaaDz3x8sCk02Fgp"
    data-ad-width="320" data-ad-height="100"></ins>`;
  const rs = document.createElement('script');
  rs.src = '//t1.kakaocdn.net/kas/static/ba.min.js'; rs.async=true;
  rAdWrap.appendChild(rs);

  window.scrollTo({top:0, behavior:'smooth'});
}

// 공유 / 저장
// =====================================================
function restartTest(){
  currentQ=0; answers=[]; selectedAnswer=null; resultType=null;
  document.getElementById('result-page').style.display='none';
  document.getElementById('quiz-page').style.display='none';
  document.getElementById('intro-page').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function shareKakao(){
  const R = RESULTS[resultType||'sunny'];
  const text = `나의 연애 유형은 "${R.name}"이래요! ${R.sub} 💘\n너는 어떤 유형이야? 👇\n${location.href}`;
  if(navigator.share){
    navigator.share({title:`나의 연애 유형은 ${R.name}!`, text, url:location.href});
  } else { copyLink(); showToast('💬 링크를 복사했어요!'); }
}
function shareInstagram(){ saveAsImage(); showToast('📸 이미지 저장 후 인스타에 올려보세요!'); }
function shareX(){
  const R = RESULTS[resultType||'sunny'];
  const txt = `나의 연애 유형은 "${R.name}"! ${R.sub} 💘 너도 해봐 →`;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(txt+' '+location.href)}`,'_blank');
}
async function copyLink(){
  try{ await navigator.clipboard.writeText(location.href); showToast('🔗 링크가 복사되었어요!'); }
  catch{ showToast('🔗 링크를 복사해주세요!'); }
}
async function saveAsImage(){
  const ov=document.getElementById('save-overlay'); ov.classList.add('show');
  try{
    const canvas=await html2canvas(document.getElementById('save-wrap'),{scale:2,useCORS:true,backgroundColor:null,logging:false});
    const a=document.createElement('a');
    a.download=`연애유형_${RESULTS[resultType||'sunny'].name}.png`;
    a.href=canvas.toDataURL('image/png'); a.click();
    showToast('📥 이미지가 저장되었어요!');
  }catch(e){ showToast('⚠️ 저장 중 오류가 발생했어요.'); }
  finally{ ov.classList.remove('show'); }
}
