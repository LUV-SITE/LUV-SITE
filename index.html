<html lang="ko">
<head>

  <meta property="og:title" content="LUV SITE — 연애·심리 테스트">
  <meta property="og:description" content="나를 알아가는 재미있는 심리 테스트 모음">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    :root {
      --pink: #ff6b9d;
      --pink-soft: #ff8fb3;
      --pink-pale: #fff0f5;
      --peach: #ffb347;
      --bg: #fff8fb;
      --text: #1a1a2e;
      --muted: #999;
      --card: #ffffff;
      --max: 430px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Gowun Dodum', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }
    .wrap { width: 100%; max-width: var(--max); padding-bottom: 60px; }

    /* 헤더 */
    header {
      padding: 40px 24px 24px;
      text-align: center;
      position: relative;
    }
    .logo {
      font-size: 32px; font-weight: 700; letter-spacing: -1px;
      background: linear-gradient(135deg, var(--pink), var(--peach));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .logo-sub { font-size: 13px; color: var(--muted); letter-spacing: 1px; }
    .heart-deco {
      position: absolute; top: 20px; right: 24px;
      font-size: 22px; animation: heartbeat 1.8s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* 광고 슬롯 상단 */
    .ad-slot{
  background:transparent;
  border:none;
  display:block;
  overflow:visible;
    }
    .ad-top{height:50px;margin:8px 16px 0;}
    .ad-mid{height:250px;margin:16px;}
    .ad-native{height:100px;margin:0 16px 16px;}

    /* 섹션 타이틀 */
    .section-title {
      font-size: 13px; font-weight: 700; color: var(--muted);
      letter-spacing: 1.5px; padding: 0 20px 12px;
      text-transform: uppercase;
    }

    /* 테스트 카드 */
    .card-list { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }

    .test-card {
      background: var(--card);
      border-radius: 20px;
      border: 1.5px solid #ffe0ec;
      padding: 20px;
      display: flex; align-items: center; gap: 16px;
      cursor: pointer; text-decoration: none; color: inherit;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative; overflow: hidden;
    }
    .test-card::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,107,157,0.03), transparent);
      pointer-events: none;
    }
    .test-card:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(255,107,157,0.15); }

    .card-emoji {
      width: 58px; height: 58px; border-radius: 16px;
      background: var(--pink-pale);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; flex-shrink: 0;
    }
    .card-info { flex: 1; }
    .card-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      background: var(--pink); color: white;
      padding: 2px 8px; border-radius: 100px; margin-bottom: 5px;
      letter-spacing: 0.5px;
    }
    .card-badge.new { background: #ff6b35; }
    .card-badge.hot { background: var(--pink); }
    .card-title { font-size: 16px; font-weight: 700; margin-bottom: 3px; line-height: 1.3; }
    .card-sub { font-size: 12px; color: var(--muted); }
    .card-arrow {
      font-size: 20px; color: #ddd; flex-shrink: 0;
      transition: transform 0.15s;
    }
    .test-card:active .card-arrow { transform: translateX(4px); }

    /* 참여자 수 */
    .card-count {
      font-size: 11px; color: var(--pink-soft);
      margin-top: 4px; font-weight: 600;
    }

    /* Coming Soon 카드 */
    .test-card.coming {
      opacity: 0.5; cursor: default; pointer-events: none;
    }
    .card-badge.soon { background: #ccc; }

    /* 광고 슬롯 중간 */
    .ad-mid { height: 90px; margin: 20px 16px; }

    /* 푸터 */
    footer {
      text-align: center; padding: 20px;
      font-size: 11px; color: var(--muted); line-height: 1.8;
    }
    footer a { color: var(--muted); text-decoration: underline; }

    /* 입장 애니메이션 */
    .card-list .test-card {
      opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.4s ease forwards;
    }
    .card-list .test-card:nth-child(1) { animation-delay: 0.1s; }
    .card-list .test-card:nth-child(2) { animation-delay: 0.2s; }
    .card-list .test-card:nth-child(3) { animation-delay: 0.3s; }
    .card-list .test-card:nth-child(4) { animation-delay: 0.4s; }
    .card-list .test-card:nth-child(5) { animation-delay: 0.5s; }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
